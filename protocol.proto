syntax = "proto3";

package Protocol;
option csharp_namespace = "Protocol";

message PlayerMoveResponse{
    int32 characterId = 1;
    float posX = 2;
    float posY = 3;
    float posZ = 4;
    int32 dir = 5;
    int32 state = 6;
}

message PlayerMoveRequest{
    int32 characterId = 1;
    float posX = 2;
    float posY = 3;
    float posZ = 4;
    int32 dir = 5;
    int32 state = 6;
}